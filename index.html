<style>

  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}

  h1{font-size:1.8rem;font-weight:700;color:var(--green);margin:0 0 .5rem;line-height:1.2;}
  .sub{color:#5A5648;max-width:36rem;margin:0;font-size:.95rem;}
  .langtoggle{position:absolute;top:1.4rem;right:1.5rem;display:flex;border:1px solid var(--line);border-radius:2rem;overflow:hidden;}
  .langtoggle button{border:none;background:transparent;padding:.35rem .8rem;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--brown);}
  .langtoggle button.active{background:var(--green);color:var(--cream);}
  main{max-width:56rem;margin:0 auto;padding:1.5rem;}
  .layout{display:flex;flex-direction:column;gap:1.5rem;}
  @media(min-width:900px){.layout{flex-direction:row;align-items:flex-start;}}
  nav{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.3rem;}
  @media(min-width:900px){nav{flex-direction:column;width:260px;flex-shrink:0;}}
  .navbtn{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;border-radius:.8rem;border:1px solid var(--line);
    background:transparent;font-weight:600;font-size:.88rem;white-space:nowrap;cursor:pointer;color:var(--ink);}
  .navbtn.active{color:var(--cream);}
  .totalbox{margin-top:1rem;padding:1rem;border-radius:.8rem;background:var(--green);color:var(--cream);display:none;}
  @media(min-width:900px){.totalbox{display:block;}}
  .totalbox .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin:0 0 .2rem;}
  .totalbox .val{font-size:1.4rem;font-weight:700;margin:0;}
  .totalbox .sub2{font-size:.72rem;opacity:.7;margin:.2rem 0 0;}
  section{flex:1;min-width:0;display:flex;flex-direction:column;gap:1.2rem;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:1rem;padding:1.4rem;}
  .card h2,.card h3{color:var(--green);margin:0 0 .3rem;}
  .card h2{font-size:1.4rem;font-weight:700;}
  .card h3{font-size:1.15rem;font-weight:700;}
  .desc{color:#5A5648;font-size:.85rem;margin:0 0 1rem;}
  label.field{font-size:.7rem;text-transform:uppercase;letter-spacing:.03em;color:var(--brown);font-weight:700;display:block;margin-bottom:.4rem;}
  input[type=number]{width:100%;padding:.55rem .7rem;border-radius:.6rem;border:1px solid var(--line);background:#fff;font-size:.95rem;}
  input[type=range]{width:100%;accent-color:var(--green);}
  .grid2{display:grid;grid-template-columns:1fr;gap:1.2rem;}
  @media(min-width:600px){.grid2{grid-template-columns:1fr 1fr;}}
  .hint{font-size:.72rem;color:var(--brown);margin-top:.3rem;}
  .rangelabels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--brown);margin-top:.2rem;}
  .resultrow{display:flex;flex-direction:column;gap:1.2rem;margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--line);}
  @media(min-width:600px){.resultrow{flex-direction:row;}}
  .resultrow .item{flex:1;}
  .resultrow .big{font-family:Georgia,serif;font-weight:700;font-size:clamp(1.2rem,4vw,1.8rem);margin:.2rem 0 0;word-break:break-word;}
  .bar-outer{height:.6rem;border-radius:1rem;background:var(--line);overflow:hidden;}
  .bar-inner{height:100%;border-radius:1rem;}
  .chartwrap{display:flex;align-items:flex-end;gap:.6rem;height:180px;padding-top:1rem;}
  .chartbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .chartbar .fill{width:70%;border-radius:.4rem .4rem 0 0;transition:height .3s;}
  .chartbar .lbl{font-size:.68rem;color:#5A5648;margin-top:.4rem;text-align:center;}
  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.8rem 1rem;
    border-radius:.8rem;font-weight:700;font-size:.9rem;border:none;cursor:pointer;background:var(--green);color:var(--cream);}
  .stocklist,.etflist{display:flex;flex-direction:column;}
  .row-item{display:flex;align-items:center;gap:.7rem;padding:.6rem 0;border-bottom:1px solid var(--line);}
  .row-item:last-child{border-bottom:none;}
  .badge{flex-shrink:0;font-size:.62rem;font-weight:700;text-transform:uppercase;padding:.25rem .5rem;border-radius:1rem;color:var(--cream);}
  .rankball{flex-shrink:0;width:1.8rem;height:1.8rem;border-radius:50%;color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;font-family:Georgia,serif;}
  .name{font-weight:700;margin:0;}
  .name small{font-weight:400;color:var(--brown);}
  .meta{font-size:.72rem;color:#5A5648;margin:.1rem 0 0;}
  .instrument{border:1px solid var(--line);border-radius:.7rem;padding:.8rem;margin-bottom:.7rem;}
  .instrument .top{display:flex;justify-content:space-between;gap:.6rem;margin-bottom:.3rem;}
  .instrument p{margin:0 0 .5rem;font-size:.85rem;color:#5A5648;}
  .allocrow{display:flex;align-items:center;gap:.6rem;}
  .allocrow .bar-outer{flex:1;}
  .allocrow .pct{font-size:.78rem;font-weight:700;flex-shrink:0;}
  .info{display:flex;gap:.5rem;font-size:.72rem;color:var(--brown);margin-top:.8rem;align-items:flex-start;}
  .kv{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;}
  .kv .k{font-size:.85rem;color:#5A5648;}
  .kv .v{font-size:.85rem;font-weight:700;}
  footer{text-align:center;font-size:.72rem;color:var(--brown);padding:2rem 1rem 3rem;font-style:italic;}
</style>
</head>

      {nama:"Tabungan terpisah / rekening berjangka pendek", alasan:{id:"Mudah dipantau, tidak tercampur dana lain, nilai tidak berfluktuasi.", en:"Easy to track, kept separate from other funds, value doesn't fluctuate."}, risiko:{id:"Sangat Rendah", en:"Very Low"}, alokasi:50},
      {nama:"Deposito jangka pendek", alasan:{id:"Return sedikit lebih baik dari tabungan biasa, tetap cair sebelum waktu liburan.", en:"Slightly better return than regular savings, still available before your trip."}, risiko:{id:"Sangat Rendah", en:"Very Low"}, alokasi:30},
      {nama:"Reksadana pasar uang", alasan:{id:"Likuid dan return sedikit di atas tabungan.", en:"Liquid, with a return slightly above savings."}, risiko:{id:"Rendah", en:"Low"}, alokasi:20},
    ]},
};

/* ---------- state ---------- */
let goals = JSON.parse(JSON.stringify(GOALS_DEFAULT));
let active = goals[0].id;
let progress = {};
let pendapatan = 0;

try {
  const saved = JSON.parse(localStorage.getItem("kalkulator-data-tabungan") || "{}");
  progress = saved.progress || {};
  pendapatan = saved.pendapatan || 0;
  if (saved.lang) lang = saved.lang;
} catch(e) {}

function saveLocal(){
  try { localStorage.setItem("kalkulator-data-tabungan", JSON.stringify({progress, pendapatan, lang})); } catch(e){}
}

/* ---------- helpers ---------- */
function fmt(n){ return "Rp" + Math.round(n||0).toLocaleString("id-ID"); }
function tr(field){ return field[lang]; }
function hitung(target, tahun, ret, inf){
  const fv = target * Math.pow(1+inf/100, tahun);
  const i = Math.pow(1+ret/100, 1/12) - 1;
  const n = tahun*12;
  const pmt = i===0 ? fv/n : (fv*i)/(Math.pow(1+i,n)-1);
  return {fv, pmt};
}
function results(){
  return goals.map(g=>{ const {fv,pmt}=hitung(g.target,g.tahun,g.ret,g.inf); return {...g, fv, pmt}; });
}

/* ---------- render ---------- */
function render(){
  const t = UI[lang];
  document.documentElement.lang = lang;
  document.getElementById("t-eyebrow").textContent = t.eyebrow;
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-sub").textContent = t.sub;
  document.getElementById("t-footer").textContent = t.footer;
  document.querySelectorAll("#langtoggle button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });

  const res = results();
  const totalBulanan = res.reduce((s,r)=>s+r.pmt,0);
  const activeGoal = res.find(g=>g.id===active);

  const nav = document.getElementById("nav");
  nav.innerHTML = res.map(g=>`
    <button class="navbtn ${g.id===active?'active':''}" data-goal="${g.id}"
      style="background:${g.id===active?g.color:'transparent'};border-color:${g.id===active?g.color:'var(--line)'}">
      <span>${g.icon}</span><span>${tr(g.label)}</span>
    </button>`).join("") + `
    <div class="totalbox">
      <p class="lbl">${t.totalPerBulan}</p>
      <p class="val">${fmt(totalBulanan)}</p>
      <p class="sub2">${t.totalGabungan}</p>
    </div>`;
  nav.querySelectorAll("[data-goal]").forEach(btn=>{
    btn.addEventListener("click", ()=>{ active = btn.dataset.goal; render(); });
  });

  const terkumpul = progress[activeGoal.id] || 0;
  const persenProgress = activeGoal.fv ? Math.min(100,(terkumpul/activeGoal.fv)*100) : 0;
  const sisa = Math.max(0, activeGoal.fv - terkumpul);

  const maxBulanan = Math.max(...res.map(r=>r.pmt));

  let afford = "";
  if (pendapatan > 0){
    const rasio = (totalBulanan/pendapatan)*100;
    let status,warna,saran;
    if(rasio<=20){status=t.statusAman;warna="#1B4332";saran=t.saranAman;}
    else if(rasio<=35){status=t.statusRealistis;warna="#7A9E7E";saran=t.saranRealistis;}
    else if(rasio<=50){status=t.statusKetat;warna="#C9A227";saran=t.saranKetat;}
    else {status=t.statusTidak;warna="#A34A28";saran=t.saranTidak;}
    afford = `
      <div class="kv" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--line)">
        <span class="k">${t.porsiPendapatan}</span>
        <span class="v" style="color:${warna}">${rasio.toFixed(1)}% — ${status}</span>
      </div>
      <div class="bar-outer"><div class="bar-inner" style="width:${Math.min(100,rasio)}%;background:${warna}"></div></div>
      <p class="desc" style="margin-top:.6rem">${saran}</p>`;
  }

  const rek = REKOMENDASI[activeGoal.id];
  const totalPorto = MY_PORTFOLIO.reduce((s,p)=>s+p.nominal,0);

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2 class="serif">${activeGoal.icon} ${tr(activeGoal.label)}</h2>
      <div class="grid2" style="margin-top:1rem">
        <div>
          <label class="field">${t.targetHariIni}</label>
          <input type="number" id="in-target" value="${activeGoal.target}">
          <p class="hint">${fmt(activeGoal.target)}</p>
        </div>
        <div>
          <label class="field">${t.jangkaWaktu(activeGoal.tahun)}</label>
          <input type="range" id="in-tahun" min="1" max="40" value="${activeGoal.tahun}">
          <div class="rangelabels"><span>${t.thMin}</span><span>${t.thMax}</span></div>
        </div>
        <div>
          <label class="field">${t.estimasiReturn(activeGoal.ret)}</label>
          <input type="range" id="in-ret" min="1" max="15" step="0.5" value="${activeGoal.ret}">
        </div>
        <div>
          <label class="field">${t.estimasiInflasi(activeGoal.inf)}</label>
          <input type="range" id="in-inf" min="0" max="12" step="0.5" value="${activeGoal.inf}">
        </div>
      </div>
      <div class="resultrow">
        <div class="item">
          <p class="hint" style="margin:0">${t.nilaiTargetDi(activeGoal.tahun)}</p>
          <p class="big serif">${fmt(activeGoal.fv)}</p>
        </div>
        <div class="item">
          <p class="hint" style="margin:0">${t.perluDitabung}</p>
          <p class="big serif" style="color:${activeGoal.color}">${fmt(activeGoal.pmt)}</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 class="serif" style="color:${activeGoal.color}">${t.progresTabungan}</h3>
      <p class="desc">${t.progresDesc(tr(activeGoal.label))}</p>
      <label class="field">${t.totalTerkumpul}</label>
      <input type="number" id="in-progress" value="${terkumpul}">
      <p class="hint">${fmt(terkumpul)}</p>
      <div class="kv" style="margin-top:1rem">
        <span class="k">${persenProgress.toFixed(1)}% ${t.dariTarget}</span>
        <span class="k">${t.sisa}: ${fmt(sisa)}</span>
      </div>
      <div class="bar-outer"><div class="bar-inner" style="width:${persenProgress}%;background:${activeGoal.color}"></div></div>
    </div>

    <button class="btn" id="btn-download">⬇ ${t.unduh}</button>

    <div class="card">
      <h3 class="serif" style="color:#1B4332">📈 ${t.ringkasanChart}</h3>
      <div class="chartwrap">
        ${res.map(r=>`
          <div class="chartbar">
            <div class="fill" style="height:${Math.max(4,(r.pmt/maxBulanan)*140)}px;background:${r.color}"></div>
            <div class="lbl">${tr(r.label).split(" ")[0]}</div>
          </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3 class="serif">🪙 ${t.cekKeterjangkauan}</h3>
      <p class="desc">${t.cekDesc}</p>
      <label class="field">${t.pendapatan}</label>
      <input type="number" id="in-pendapatan" value="${pendapatan}">
      <p class="hint">${fmt(pendapatan)}</p>
      ${afford}
    </div>

    <div class="card">
      <h3 class="serif" style="color:${activeGoal.color}">${t.pilihanInstrumen(tr(activeGoal.label))}</h3>
      <p class="desc">${tr(rek.catatan)}</p>
      ${rek.instrumen.map(it=>`
        <div class="instrument">
          <div class="top">
            <p class="name" style="margin:0">${it.nama}</p>
            <span class="badge" style="background:#F4EFE2;color:var(--brown)">${tr(it.risiko)}</span>
          </div>
          <p>${tr(it.alasan)}</p>
          <div class="allocrow">
            <div class="bar-outer"><div class="bar-inner" style="width:${it.alokasi}%;background:${activeGoal.color}"></div></div>
            <span class="pct" style="color:${activeGoal.color}">${it.alokasi}%</span>
          </div>
        </div>`).join("")}
    </div>

    <div class="card">
      <h3 class="serif">${t.top10Title}</h3>
      <p class="desc">${t.top10Desc}</p>
      <div class="stocklist">
        ${TOP10_STOCKS.map(s=>`
          <div class="row-item">
            <div class="rankball" style="background:${s.rank<=3?'#1B4332':'#8C5E3C'}">${s.rank}</div>
            <div style="flex:1;min-width:0">
              <p class="name">${s.nama} <small>— ${s.ticker}</small></p>
              <p class="meta">${tr(s.sektor)}</p>
            </div>
            <span style="font-weight:700;color:#1B4332;flex-shrink:0">${s.cap}</span>
          </div>`).join("")}
      </div>
      <div class="info">ℹ️ ${t.top10Info}</div>
    </div>

    <div class="card">
      <h3 class="serif">${t.portoTitle}</h3>
      <p class="desc">${t.portoTotal}: ${fmt(totalPorto)}</p>
      <div class="stocklist">
        ${MY_PORTFOLIO.map(p=>{
          const diTop10 = TOP10_TICKERS.has(p.ticker);
          const pct = totalPorto ? (p.nominal/totalPorto)*100 : 0;
          return `
          <div class="row-item">
            <span class="badge" style="background:${diTop10?'#1B4332':'#C9A227'}">${diTop10?t.portoTop10:t.portoLuar}</span>
            <div style="flex:1;min-width:0">
              <p class="name">${p.nama} <small>— ${p.ticker}</small></p>
              <p class="meta">${pct.toFixed(0)}% ${t.portoPct}</p>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <p style="font-weight:700;color:#1B4332;margin:0">${p.nominal>0?fmt(p.nominal):"-"}</p>
              <div style="display:flex;gap:.3rem;justify-content:flex-end;margin-top:.2rem">
                <span style="font-size:.62rem;font-weight:700;padding:.1rem .35rem;border-radius:.3rem;background:${p.ytd>=0?'#E8F0E8':'#F5E4DC'};color:${p.ytd>=0?'#1B4332':'#A34A28'}">YTD ${p.ytd>=0?'+':''}${p.ytd.toFixed(1)}%</span>
                <span style="font-size:.62rem;font-weight:700;padding:.1rem .35rem;border-radius:.3rem;background:${p.ttm>=0?'#E8F0E8':'#F5E4DC'};color:${p.ttm>=0?'#1B4332':'#A34A28'}">1Y ${p.ttm>=0?'+':''}${p.ttm.toFixed(1)}%</span>
              </div>
            </div>
          </div>`;
        }).join("")}
      </div>
      <div class="info">ℹ️ ${t.portoInfo}</div>
    </div>

    <div class="card">
      <h3 class="serif">${t.etfTitle}</h3>
      <p class="desc">${t.etfDesc}</p>
      <div class="etflist">
        ${ETF_LIST.map(e=>`
          <div class="row-item">
            <div style="flex:1;min-width:0">
              <p class="name">${e.nama} <small>— ${e.full}</small></p>
              <p class="meta">${tr(e.desc)}</p>
            </div>
            <div style="text-align:right;font-size:.72rem;color:var(--brown);flex-shrink:0">
              <p style="margin:0">${t.biaya}: ${e.exp}</p>
              <p style="margin:0">${t.risikoLbl}: ${tr(e.risiko)}</p>
            </div>
          </div>`).join("")}
      </div>
    </div>
  `;

  document.getElementById("in-target").addEventListener("change", e=>{
    goals = goals.map(g=>g.id===active?{...g, target:Number(e.target.value)}:g); render();
  });
  document.getElementById("in-tahun").addEventListener("input", e=>{
    goals = goals.map(g=>g.id===active?{...g, tahun:Number(e.target.value)}:g); render();
  });
  document.getElementById("in-ret").addEventListener("input", e=>{
    goals = goals.map(g=>g.id===active?{...g, ret:Number(e.target.value)}:g); render();
  });
  document.getElementById("in-inf").addEventListener("input", e=>{
    goals = goals.map(g=>g.id===active?{...g, inf:Number(e.target.value)}:g); render();
  });
  document.getElementById("in-progress").addEventListener("change", e=>{
    progress[active] = Number(e.target.value); saveLocal(); render();
  });
  document.getElementById("in-pendapatan").addEventListener("change", e=>{
    pendapatan = Number(e.target.value); saveLocal(); render();
  });
  document.getElementById("btn-download").addEventListener("click", downloadRingkasan);
}

document.getElementById("langtoggle").addEventListener("click", e=>{
  const btn = e.target.closest("button[data-lang]");
  if (!btn) return;
  lang = btn.dataset.lang; saveLocal(); render();
});

function downloadRingkasan(){
  const t = UI[lang];
  const res = results();
  const totalBulanan = res.reduce((s,r)=>s+r.pmt,0);
  const lines = [];
  lines.push(lang==="id" ? "PANDUAN TARGET TABUNGAN & PILIHAN INVESTASI" : "SAVINGS TARGET & INVESTMENT GUIDE");
  lines.push(t.footer);
  lines.push("=".repeat(50));
  lines.push("");
  lines.push(lang==="id" ? "RINGKASAN TARGET" : "TARGET SUMMARY");
  lines.push("-".repeat(50));
  res.forEach(g=>{
    lines.push(tr(g.label));
    lines.push(`  ${t.targetHariIni.split(" (")[0]}: ${fmt(g.target)}`);
    lines.push(`  ${lang==="id"?"Jangka waktu":"Time horizon"}: ${g.tahun} ${lang==="id"?"tahun":"years"}`);
    lines.push(`  ${lang==="id"?"Nilai target (FV)":"Target value (FV)"}: ${fmt(g.fv)}`);
    lines.push(`  ${t.perluDitabung}: ${fmt(g.pmt)}`);
    lines.push("");
  });
  lines.push(`${lang==="id"?"TOTAL TABUNGAN PER BULAN (gabungan)":"TOTAL MONTHLY SAVINGS (combined)"}: ${fmt(totalBulanan)}`);
  if (pendapatan > 0){
    const rasio = (totalBulanan/pendapatan)*100;
    lines.push(`${t.pendapatan}: ${fmt(pendapatan)} (${t.porsiPendapatan}: ${rasio.toFixed(1)}%)`);
  }
  lines.push("");
  lines.push(lang==="id" ? "PROGRES TABUNGAN SAAT INI" : "CURRENT SAVINGS PROGRESS");
  lines.push("-".repeat(50));
  res.forEach(g=>{
    const terkumpul = progress[g.id] || 0;
    const persen = g.fv ? Math.min(100,(terkumpul/g.fv)*100) : 0;
    lines.push(`${tr(g.label)}: ${fmt(terkumpul)} (${persen.toFixed(1)}% ${t.dariTarget})`);
  });
  lines.push("");
  lines.push("=".repeat(50));
  lines.push(lang==="id" ? "PILIHAN INSTRUMEN PER TUJUAN" : "SUGGESTED INSTRUMENTS PER GOAL");
  lines.push("=".repeat(50));
  res.forEach(g=>{
    const rek = REKOMENDASI[g.id];
    if(!rek) return;
    lines.push("");
    lines.push(tr(g.label).toUpperCase());
    lines.push(tr(rek.catatan));
    lines.push("");
    rek.instrumen.forEach(it=>{
      lines.push(`  * [${it.alokasi}%] ${it.nama} (${t.risikoLbl.toLowerCase()}: ${tr(it.risiko)})`);
      lines.push(`    ${tr(it.alasan)}`);
    });
  });
  lines.push("");
  lines.push("=".repeat(50));
  lines.push(lang==="id" ? "CATATAN PENTING" : "IMPORTANT NOTES");
  lines.push("=".repeat(50));
  if (lang==="id"){
    lines.push("- Ini bukan rekomendasi personal, sesuaikan dengan profil risiko masing-masing.");
    lines.push("- Angka return & inflasi adalah estimasi, hasil nyata bisa berbeda.");
    lines.push("- Untuk dana darurat & jalan-jalan, hindari instrumen yang berfluktuasi tajam.");
    lines.push("- Diversifikasi membantu mengurangi risiko.");
  } else {
    lines.push("- This is not personal advice, adjust it to your own risk profile.");
    lines.push("- Return & inflation figures are estimates, real results may differ.");
    lines.push("- For emergency & travel funds, avoid instruments that swing sharply in value.");
    lines.push("- Diversification helps reduce risk.");
  }

  const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "panduan-target-investasi.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
